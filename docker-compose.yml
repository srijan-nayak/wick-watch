services:
  wickwatch:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - wickwatch-data:/data
    environment:
      # Required: get these from https://developers.kite.trade/
      KITE_API_KEY: ${KITE_API_KEY:?Set KITE_API_KEY in a .env file or export it}
      KITE_API_SECRET: ${KITE_API_SECRET:?Set KITE_API_SECRET in a .env file or export it}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wickwatch-data:
    driver: local
